<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Local Chat - Room</title>
    <!-- Use Inter font for clean, modern look -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div id="app" class="chat-page">
        <!-- Top Chat Header -->
        <header class="app-header chat-header">
            <button id="back-btn" class="btn-icon" onclick="window.location.href='rooms.html'" title="Back to Rooms">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
            </button>
            <div class="room-header-info">
                <h2 id="room-title">Local Room</h2>
                <div class="room-stats">
                    <span class="active-dot"></span> <span id="room-people">3</span> online • ⏳ 1h 14m left
                </div>
            </div>
            <div class="header-spacer"></div>
        </header>

        <!-- Messages Viewing Area -->
        <main id="messages-area" class="messages-area">
            <!-- Messages dynamically injected by JS -->
        </main>

        <!-- Bottom Input Area Fixed to Footer -->
        <footer class="chat-footer">
            <div class="input-wrapper">
                <input type="text" id="message-input" class="chat-input" placeholder="Message..." autocomplete="off">
                <button id="send-btn" class="send-btn" title="Send">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-left: 2px;">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
        </footer>
    </div>
    
    <!-- Socket.io client -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="assets/js/chat.js"></script>
</body>
</html>
